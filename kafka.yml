server:
  port: 8888
  servlet:
    context-path: /bankingapp

spring:
  application:
    name: Login-Service-API

  datasource:
    url: jdbc:mysql://localhost:3306/bankingdb
    username: root
    password: yourpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  file:
    name: logs/application.log
  level:
    org.springframework: INFO
    com.banking: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /manage
  endpoint:
    health:
      show-details: never
  endpoint:
    shutdown:
      enabled: false

info:
  app:
    name: Digital Banking Platform
    version: 1.0.0
    description: Production-ready banking application

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
